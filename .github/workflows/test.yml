name: Unit Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # Allows deploy.yml to gate on this workflow

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate

      - name: Run unit tests
        run: npx vitest run

      # Lint is clean (0 problems) and now gates the pipeline to keep it that way.
      - name: Lint
        run: npm run lint
