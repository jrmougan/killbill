name: Unit Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # Allows deploy.yml to gate on this workflow

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate

      - name: Run unit tests
        run: npx vitest run

      # Non-blocking for now: there is pre-existing lint debt (~83 problems).
      # Surfaces lint output without failing the pipeline; flip to blocking once green.
      - name: Lint
        run: npm run lint
        continue-on-error: true
