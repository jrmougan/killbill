name: Unit Tests & Lint

on:
  # Runs on PRs (gate) and is called by deploy.yml on push to main (workflow_call).
  # No standalone push trigger: on main the deploy pipeline runs it via needs:[test]
  # so it isn't executed twice per push.
  pull_request:
    branches: [main]
  workflow_call: # Allows deploy.yml to gate on this workflow

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Reports known vulnerabilities but never fails the build.
      - name: Security audit (non-blocking)
        run: npm audit --audit-level=high || true

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate

      - name: Run unit tests
        run: npx vitest run

      # Lint is clean (0 problems) and now gates the pipeline to keep it that way.
      - name: Lint
        run: npm run lint
