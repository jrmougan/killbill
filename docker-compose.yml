services:
  app:
    image: ghcr.io/jrmougan/killbill:latest
    container_name: killbill-app
    restart: unless-stopped
    environment:
      # Database connection
      - DATABASE_HOST=mysql
      - DATABASE_USER=killbill
      - DATABASE_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_NAME=killbill
      - DATABASE_PORT=3306
      # Prisma connection string
      - DATABASE_URL=mysql://killbill:${MYSQL_PASSWORD}@mysql:3306/killbill
      # Security
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - mysql_network
      - traefik
    volumes:
      - ./uploads:/app/public/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.killbill.rule=Host(`finanzas.mougan.es`)"
      - "traefik.http.routers.killbill.entrypoints=websecure"
      - "traefik.http.routers.killbill.tls.certresolver=myresolver"
      - "traefik.http.services.killbill.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik"

networks:
  mysql_network:
    external: true
  traefik:
    external: true
